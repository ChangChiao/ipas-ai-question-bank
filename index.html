<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="data:image/x-icon;,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 學習小幫手 | 隨堂測驗</title>
    <!-- 引入 Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- 首頁選單 -->
    <main id="main-menu" class="screen active fade-in">
        <div class="glass-panel text-center">
            <div class="icon-wrapper">🚀</div>
            <h1 class="gradient-text">AI 學習與題庫助手</h1>
            <p class="subtitle">開始您的 AI 知識挑戰，或隨機學習新概念</p>
            <div class="button-group">
                <button id="btn-quiz" class="btn primary-btn">
                    <span class="btn-icon">📝</span> 隨堂測驗 (10題)
                </button>
                <button id="btn-learn" class="btn secondary-btn">
                    <span class="btn-icon">💡</span> 學習概念
                </button>
            </div>
        </div>
    </main>

    <!-- 測驗進行中 -->
    <section id="quiz-screen" class="screen">
        <div class="glass-panel quiz-container">
            <div class="quiz-header">
                <span class="badge" id="question-counter">題數: 1 / 10</span>
                <span class="badge score-badge" id="score-counter">得分: 0</span>
            </div>
            
            <div class="progress-bar-container">
                <div class="progress-fill" id="progress-bar"></div>
            </div>

            <div class="question-body">
                <h2 id="question-text">讀取題目中...</h2>
            </div>
            
            <div class="options-grid" id="options-container">
                <!-- 選項將以 JS 動態生成 -->
            </div>

            <!-- 詳解區域 -->
            <div id="explanation-box" class="explanation-box hidden">
                <div class="explanation-header" id="explanation-header">
                    <span class="result-icon" id="result-icon">✔️</span>
                    <strong id="result-title">答對了！</strong>
                </div>
                <p id="explanation-text"></p>
                <div class="action-row">
                    <button id="btn-next" class="btn primary-btn sm-btn">下一題 ➔</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 測驗結果 -->
    <section id="result-screen" class="screen">
        <div class="glass-panel text-center result-panel">
            <h2>測驗結果</h2>
            <div class="score-circle">
                <span id="final-score">0</span>
                <small>/ 100</small>
            </div>
            <p id="result-message" class="subtitle">再接再厲！</p>
            <div class="button-group mt-6">
                <button id="btn-restart" class="btn primary-btn">重新測驗</button>
                <button id="btn-home" class="btn secondary-btn">回主畫面</button>
            </div>
        </div>
    </section>

    <!-- 學習概念 -->
    <section id="concept-screen" class="screen">
        <div class="glass-panel concept-container">
            <div class="concept-header">
                <button id="btn-concept-back" class="btn secondary-btn sm-btn">⬅ 返回首頁</button>
                <h2 class="gradient-text m-0" id="concept-title">📚 學習領域</h2>
                <div style="width: 80px;"></div>
            </div>
            
            <div id="category-list" class="concept-grid">
                <p class="text-center">載入中...</p>
            </div>

            <div id="keyword-list" class="concept-grid hidden">
                <!-- 動態生成的關鍵字 -->
            </div>

            <div id="concept-detail" class="detail-box hidden">
                <h3 id="detail-name" class="gradient-text">名詞名稱</h3>
                
                <div class="detail-section">
                    <h4>📝 概念解釋</h4>
                    <p id="detail-concept"></p>
                </div>
                
                <div class="detail-section">
                    <h4>💡 使用場景</h4>
                    <ul id="detail-usecases"></ul>
                </div>
                
                <div class="detail-section">
                    <h4>🔗 關聯關鍵字</h4>
                    <div id="detail-related" class="tags-container"></div>
                </div>
            </div>
        </div>
    </section>

    <script src="app.js?v=2"></script>
</body>
</html>
